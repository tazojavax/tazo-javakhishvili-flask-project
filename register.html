<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Food World</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

    <style>
        body{
            margin:0;
            font-family:Arial, sans-serif;
            background:linear-gradient(135deg,#d62828,#f77f00);
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .register-box{
            background:white;
            width:400px;
            padding:35px;
            border-radius:15px;
            box-shadow:0 8px 20px rgba(0,0,0,0.2);
            text-align:center;
        }

        .register-box h1{
            color:#d62828;
            margin-bottom:10px;
        }

        .register-box p{
            color:gray;
            margin-bottom:25px;
        }

        .register-box input{
            width:100%;
            padding:12px;
            margin:10px 0;
            border:1px solid #ccc;
            border-radius:8px;
            box-sizing:border-box;
        }

        .register-box button{
            width:100%;
            padding:12px;
            border:none;
            background:#d62828;
            color:white;
            font-size:16px;
            border-radius:8px;
            cursor:pointer;
            transition:0.3s;
        }

        .register-box button:hover{
            background:#b71c1c;
        }

        .login-link{
            margin-top:15px;
        }

        .login-link a{
            color:#d62828;
            text-decoration:none;
            font-weight:bold;
        }
    </style>
</head>
<body>

<div class="register-box">

    <h1>🍔 Food World</h1>

    <p>Create your account</p>

    <form method="POST">

        <input
            type="text"
            name="username"
            placeholder="Username"
            required>

        <input
            type="email"
            name="email"
            placeholder="Email Address"
            required>

        <input
            type="password"
            name="password"
            placeholder="Password"
            required>

        <button type="submit">
            Register
        </button>

    </form>

    <div class="login-link">
        Already have an account?
        <a href="/login">Login</a>
    </div>

</div>

</body>
</html>
